name: Proffera gated automerge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to evaluate"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  gated-automerge:
    name: Gated automerge
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate and merge if safe
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          summary="$GITHUB_STEP_SUMMARY"
          echo "# Proffera gated automerge" >> "$summary"

          pr_number="${INPUT_PR_NUMBER:-}"
          if [ -z "$pr_number" ]; then
            pr_number="${EVENT_PR_NUMBER:-}"
          fi

          if [ -z "$pr_number" ]; then
            echo "Refused: no pull request number was provided." >> "$summary"
            exit 0
          fi

          pr_json="$(gh pr view "$pr_number" --repo "$REPOSITORY" --json baseRefName,headRefName,headRefOid,labels,isDraft,state)"

          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          head_sha="$(jq -r '.headRefOid' <<< "$pr_json")"
          is_draft="$(jq -r '.isDraft' <<< "$pr_json")"
          state="$(jq -r '.state' <<< "$pr_json")"
          has_label="$(jq -r '[.labels[].name] | index("ibbo-approved") != null' <<< "$pr_json")"

          echo "- PR: #$pr_number" >> "$summary"
          echo "- Base: $base_ref" >> "$summary"
          echo "- Head: $head_ref" >> "$summary"
          echo "- Head SHA: $head_sha" >> "$summary"

          if [ "$state" != "OPEN" ]; then
            echo "Refused: PR is not open." >> "$summary"
            exit 0
          fi

          if [ "$is_draft" = "true" ]; then
            echo "Refused: PR is draft." >> "$summary"
            exit 0
          fi

          if [ "$base_ref" != "main" ]; then
            echo "Refused: PR does not target main." >> "$summary"
            exit 0
          fi

          case "$head_ref" in
            work/proffera-*|work/chat-*)
              echo "- Branch gate: allowed" >> "$summary"
              ;;
            *)
              echo "Refused: source branch must start with work/proffera- or work/chat-." >> "$summary"
              exit 0
              ;;
          esac

          if [ "$has_label" != "true" ]; then
            echo "Refused: missing ibbo-approved label." >> "$summary"
            exit 0
          fi

          blocked_regex='^(\.github/workflows/|\.env|vercel\.json$|next\.config\.|middleware\.|src/app/api/|src/lib/auth/|src/lib/supabase/|src/lib/workspace/|src/lib/tenant|supabase/|prisma/|package\.json$|package-lock\.json$|pnpm-lock\.yaml$|yarn\.lock$)'
          changed_files="$(gh pr diff "$pr_number" --repo "$REPOSITORY" --name-only)"

          echo "## Changed files" >> "$summary"
          if [ -z "$changed_files" ]; then
            echo "Refused: PR has no changed files." >> "$summary"
            exit 0
          fi

          while IFS= read -r file; do
            echo "- $file" >> "$summary"
            if [[ "$file" =~ $blocked_regex ]]; then
              echo "Refused: blocked sensitive path changed: $file" >> "$summary"
              exit 0
            fi
          done <<< "$changed_files"

          checks_json="$(gh pr checks "$pr_number" --repo "$REPOSITORY" --json name,state,bucket --jq '.')"

          pending_count="$(jq '[.[] | select(.state == "PENDING" or .bucket == "pending")] | length' <<< "$checks_json")"
          failed_count="$(jq '[.[] | select(.state == "FAILURE" or .state == "ERROR" or .state == "CANCELLED" or .bucket == "fail")] | length' <<< "$checks_json")"
          total_count="$(jq 'length' <<< "$checks_json")"

          echo "## Checks" >> "$summary"
          jq -r '.[] | "- \(.name): \(.state)"' <<< "$checks_json" >> "$summary"

          if [ "$total_count" = "0" ]; then
            echo "Refused: no checks found." >> "$summary"
            exit 0
          fi

          if [ "$pending_count" != "0" ]; then
            echo "Refused: checks are pending." >> "$summary"
            exit 0
          fi

          if [ "$failed_count" != "0" ]; then
            echo "Refused: checks failed or were cancelled." >> "$summary"
            exit 0
          fi

          echo "All gates passed. Merging with squash." >> "$summary"
          gh pr merge "$pr_number" --repo "$REPOSITORY" --squash --delete-branch --match-head-commit "$head_sha"
          echo "Merged with squash and deleted source branch." >> "$summary"
